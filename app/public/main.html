 <style>
  .hidden { 
    display: none !important;
  }

  /* ===== 페이지 전체 페이드인 ===== */
  body {
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.6s ease-out, transform 0.6s ease-out;
  }
  body.page-enter {
    opacity: 1;
    transform: translateY(0);
  }

  /* ===== 메인 카드 전체 슬라이드업 ===== */
  .main-wrap {
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.7s ease-out, transform 0.7s ease-out;
  }
  body.page-enter .main-wrap {
    opacity: 1;
    transform: translateY(0);
  }

  /* ===== 타이틀 + 밑줄 ===== */
  /* 타이틀을 애니메이션용 컨테이너로 활용 */
  /* 숨김 공통 클래스는 이렇게( !important 그대로 둬도 됨 ) */
/* 숨김 클래스는 이렇게(이미 있으면 그대로 두면 됨) */
/* 이미 있는 hidden 유지 */
  .hidden {
    display: none !important;
  }

  /* 타이틀 컨테이너 */
    #title {
      position: relative;
      display: inline-block;
    }

    /* 처음에는 '글' 안 보이게 + 른 쪽에서 굴러 나올 준비 */
    .char-g {
      display: inline-block;
      opacity: 0;
      transform: translateX(-0.6em) rotate(-80deg);
      transform-origin: center center;
    }


    /* 페이지가 들어올 때 '글'만 살짝 늦게 등장 */
    body.page-enter #title .char-g {
      animation: charGIn 0.9s ease-out 0.5s forwards;
    }

   @keyframes charGIn {
    0% {
      opacity: 0;
      transform: translateX(-0.6em) rotate(-80deg); /* 른 쪽에서 기울어진 상태 */
    }
    50% {
      opacity: 1;
      transform: translateX(0.1em) rotate(15deg);   /* 살짝 앞으로 굴러나옴 */
    }
    100% {
      opacity: 1;
      transform: translateX(0) rotate(0deg);        /* 제 위치에 착- 안착 */
    }
  }


  /* 밑줄 애니는 그대로 두면 됨 */
  #title::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: 0;
    height: 3px;
    width: 100%;
    background: linear-gradient(90deg, #0f172a, #64748b);
    border-radius: 9999px;
    transform-origin: left;
    transform: scaleX(0);
    animation: titleUnderline 0.9s ease-out forwards;
  }


  @keyframes titleUnderline {
    0%   { transform: scaleX(0); opacity: 0; }
    30%  { opacity: 1; }
    100% { transform: scaleX(1); opacity: 1; }
  }

  /* ===== 서브타이틀 부드러운 페이드인 ===== */
  .logo-subtitle {
    margin-top: 6px;
    font-size: 13px;
    color: #64748b;
    opacity: 0;
    transform: translateY(4px);
    animation: subtitleFade 0.7s ease-out 0.4s forwards;
  }

  @keyframes subtitleFade {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* ===== 버튼 호버 애니메이션 ===== */
  .btn {
    position: relative;
    transition:
      transform 0.18s ease-out,
      box-shadow 0.18s ease-out,
      background-color 0.18s ease-out,
      color 0.18s ease-out;
  }

  .btn:hover {
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 10px 20px rgba(15, 23, 42, 0.18);
  }

  /* ===== 순위 카드 살짝 둥실둥실 ===== */
  .rank-card {
    animation: cardFloat 2.5s ease-in-out infinite;
  }

  @keyframes cardFloat {
    0%   { transform: translateY(0); }
    50%  { transform: translateY(-4px); }
    100% { transform: translateY(0); }
  }

  /* ===== 순위 아이템 슬라이드인 ===== */
  .rank-item {
    opacity: 0;
    transform: translateY(10px);
    animation: rankSlideUp 0.4s ease-out forwards;
  }

  @keyframes rankSlideUp {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
</style>

      <!-- Auth Modal -->
  <div id="authModal" class="modal hidden" aria-hidden="true" role="dialog" aria-modal="true">
    <div class="modal-backdrop" data-close="1"></div>

  <div class="modal-panel" role="document">
    <button class="modal-close" aria-label="닫기" data-close="1">✕</button>

    <h2 class="modal-title">로그인</h2>

    <form id="authForm">
      <label class="field">
        <span>아이디</span>
        <input id="auth-username" name="username" type="text" autocomplete="username" required />
      </label>

      <label class="field">
        <span>비밀번호</span>
        <input id="auth-password" name="password" type="password" autocomplete="current-password" required />
      </label>

      <button id="authSubmit" type="submit" class="primary">로그인</button>

      <div id="switcherRow" class="switcher-row">
        <span class="muted">아직 계정이 없나요?</span>
        <a href="javascript:void(0)" id="toSignupLink">회원가입</a>
      </div>

      <p id="authError" class="error" role="alert" aria-live="polite"></p>
    </form>
  </div>
</div>

  </div>

  <script>
// // 타이틀 그림자 (임시 비활성화)
// const textElement = document.getElementById('title');

// document.addEventListener('mousemove', (e) => {
//   const x = e.clientX;
//   const y = e.clientY;

//   const rect = textElement.getBoundingClientRect();
//   const centerX = rect.left + rect.width / 2;
//   const centerY = rect.top + rect.height / 2;

//   const offsetX = x - centerX;
//   const offsetY = y - centerY;

//   textElement.style.textShadow = `${offsetX / 80}px ${offsetY / 80}px 4px rgba(0,0,0,0.5)`; //그림자 이동
// });


    // ===== 기본 설정 =====
    const API_BASE = `${location.protocol}//${location.hostname}:8000`;

    // ===== 인증 유틸 =====
    const Auth = {
      get token()    { return localStorage.getItem('token') || ''; },
      set token(v)   { v ? localStorage.setItem('token', v) : localStorage.removeItem('token'); },
      get username() { return localStorage.getItem('username') || ''; },
      set username(v){ v ? localStorage.setItem('username', v) : localStorage.removeItem('username'); },
    };

    // ===== 모달 요소 =====
    const modalEl   = document.getElementById('authModal');
    const titleEl   = modalEl.querySelector('.modal-title');
    const formEl    = document.getElementById('authForm');
    const userEl    = document.getElementById('auth-username');
    const passEl    = document.getElementById('auth-password');
    const submitEl  = document.getElementById('authSubmit');
    const errorEl   = document.getElementById('authError');
    const switcherRow = document.getElementById('switcherRow'); // 하단 안내/링크 영역

    let mode = 'login'; // 'login' | 'signup'

    // ===== 모드 전환 =====
    function setMode(next) {
      mode = next;

      if (mode === 'login') {
        titleEl.textContent = '로그인';
        submitEl.textContent = '로그인';
        passEl.autocomplete = 'current-password';

        // 하단: 아직 계정이 없나요?  |  회원가입
        if (switcherRow) {
          switcherRow.style.display = 'flex';
          switcherRow.innerHTML =
            '<span class="muted">아직 계정이 없나요?</span>' +
            '<a href="javascript:void(0)" id="toSignupLink">회원가입</a>';
        }
      } else {
        titleEl.textContent = '회원가입';
        submitEl.textContent = '회원가입';
        passEl.autocomplete = 'new-password';

        // 하단: 이미 계정이 있나요?  |  로그인
        if (switcherRow) {
          switcherRow.style.display = 'flex';
          switcherRow.innerHTML =
            '<span class="muted">이미 계정이 있나요?</span>' +
            '<a href="javascript:void(0)" id="toLoginLink">로그인</a>';
        }
      }

      errorEl.textContent = '';
      setTimeout(() => userEl.focus(), 0);
    }

    function openAuth(nextMode = 'login', presetUsername = '') {
      setMode(nextMode);
      modalEl.classList.remove('hidden');
      modalEl.setAttribute('aria-hidden','false');
      document.body.style.overflow = 'hidden';
      userEl.value = presetUsername || '';
      passEl.value = '';
      errorEl.textContent = '';
    }

    function closeAuth() {
      modalEl.classList.add('hidden');
      modalEl.setAttribute('aria-hidden','true');
      document.body.style.overflow = '';
    }

    // 모달 닫기 (배경/버튼/ESC)
    modalEl.addEventListener('click', (e) => {
      if (e.target.dataset.close === '1') closeAuth();
    });
    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && !modalEl.classList.contains('hidden')) closeAuth();
    });

    // ===== 폼 제출 =====
    formEl.addEventListener('submit', async (e) => {
      e.preventDefault();
      submitEl.disabled = true;
      errorEl.textContent = '';

      const username = userEl.value.trim();
      const password = passEl.value.trim();
      if (!username || !password) {
        errorEl.textContent = '아이디와 비밀번호를 입력해 주세요.';
        submitEl.disabled = false;
        return;
      }

      try {
        if (mode === 'signup') {
          const r = await fetch(`/auth/register`, {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ username, password })
          });
          const d = await r.json().catch(()=>({}));
          if (!r.ok) throw new Error(d.detail || '회원가입 실패');

          // 회원가입 성공 → 로그인 모드 전환
          setMode('login');
          userEl.value = username;
          passEl.value = '';
          alert('회원가입이 완료되었습니다. 로그인해 주세요.');
        } else {
          const r = await fetch(`/auth/login`, {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ username, password })
          });
          const d = await r.json().catch(()=>({}));
          if (!r.ok || !d.token) throw new Error(d.detail || '로그인 실패');

          Auth.token = d.token;
          Auth.username = d.username || username;
          renderAuthButtons();
          closeAuth();
          alert(`${Auth.username}님 로그인되었습니다.`);
        }
      } catch (err) {
        errorEl.textContent = err.message || '처리 중 오류가 발생했습니다.';
      } finally {
        submitEl.disabled = false;
      }
    });

    // ===== 하단 링크 클릭(이벤트 위임) =====
    switcherRow?.addEventListener('click', (e) => {
      if (e.target.id === 'toSignupLink') setMode('signup');
      if (e.target.id === 'toLoginLink')  setMode('login');
    });

    function logout() {
      Auth.token = '';
      Auth.username = '';
      renderAuthButtons();
      alert("로그아웃 되었습니다.");
    }

    // ===== 헤더 버튼 상태/동작 =====
    function renderAuthButtons() {
      const loginA  = document.querySelector('.login');
      const signupA = document.querySelector('.sign-up');
      const profA   = document.querySelector('.profile');
      if (!loginA || !signupA || !profA) return;

      if (Auth.token) {
        loginA.textContent = `${Auth.username} (로그아웃)`;
        loginA.onclick = () => { Auth.token=''; Auth.username=''; renderAuthButtons(); };
        signupA.classList.add('hidden');
        profA.classList.remove('hidden');
        loginA.onclick = () => logout();
        profA.onclick = () => location.href = '/profile';
      } else {
        loginA.textContent = '로그인';
        loginA.onclick = () => openAuth('login');
        signupA.textContent = '회원가입';
        signupA.classList.remove('hidden');
        signupA.onclick = () => openAuth('signup');
        profA.classList.add('hidden');
      }
    }

    // ===== 인증 요청 헬퍼 =====
    async function fetchWithAuth(url, opts = {}) {
      const headers = new Headers(opts.headers || {});
      if (Auth.token) headers.set('Authorization', `Bearer ${Auth.token}`);
      return fetch(url, { ...opts, headers });
    }

    // ===== 순위 불러오기 =====
    async function loadLeaderboard() {
      const box = document.querySelector('.rank-card .rank-list');
      if (!box) return;
      box.textContent = '불러오는 중...';
      try {
        const res = await fetch(`/auth/leaderboard`);
        const list = await res.json();
        if (!Array.isArray(list) || !list.length) {
          box.textContent = '아직 기록이 없습니다.';
          return;
        }
          box.innerHTML = '';
          list.forEach((row, i) => {
          const item = document.createElement('div');
          item.className = 'rank-item';
          item.style.animationDelay = `${i * 0.08}s`;  // 순위마다 0.08초 딜레이
          item.innerHTML = `${i+1}. <b>${row.username}</b> - 최고점: ${row.best_score}점`;
          box.appendChild(item);
        });

      } catch (e) {
        console.error(e);
        box.textContent = '순위를 불러오지 못했습니다.';
      }
    }

    // 초기 실행
    window.addEventListener('load', () => {
      // 페이지 전체 페이드인 시작
      document.body.classList.add('page-enter');

      renderAuthButtons();
      loadLeaderboard();
    });

   


  </script>
  
</body>
