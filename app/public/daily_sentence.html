<body>
  <!-- 로딩 중 -->
  <div class="loading hidden">
    <div class="loading-spinner"></div>
  </div>

<!-- 헤더 -->
  <header class="site-header">
    <h1 class="logo">
      <img class="logo-image" src="/static/image/logo2.png" alt="로고">
      <a href="main.html" class="logo-title">바른 글씨 - 오늘의 손글씨</a>
    </h1>
  </header>

  <div class="layout-bg">
    <div class="main-wrap">

      <!-- 오늘의 문장, 제한 시간 카드 묶음 -->
      <div class="cards-container1">
        <!-- 오늘의 문장 표시 -->
        <div class="card today-sentence-card">
          <div class="card-title2">
            오늘의 손글씨 문장
            <button class="refresh-button" onclick="refreshSentence()">🔄 새 문장</button>
          </div>
          <div class="highlight-box1" id="daily-sentence">불러오는 중...</div>
        </div>

        <!-- 제한 시간 -->
        <div class="card timer-card">
          <div class="card-title">제한 시간</div>
          <div class="highlight-box2" id="timer-display">60초 남음</div>
        </div>
      </div>

      <!-- 업로드 카드, 점수 카드, 교정 텍스트 카드, 피드백 결과 카드 묶음 -->
      <div class="cards-container">
        <!-- 업로드 카드 -->
        <div class="upload-card card">
          <div class="card-title">손글씨 이미지 업로드</div>
          <div class="upload-desc">JPG, PNG 형식의 손글씨 이미지를 선택하거나 드래그하여 업로드하세요.</div>
          <div class="upload-box">
            <img id="preview" class="preview-image hidden" alt="미리보기 이미지">
            <div class="upload-info">이미지를 선택하거나 여기에 드래그하세요.<br><br> JPG, JPEG, PNG 및 WEBP. 최대 20MB.</div>
            <button class="btn gray" onclick="previewImage()">파일 올리기</button>
          </div>
          <div class="btns">
            <button class="btn blue1" onclick="submitImage()">분석하기</button>
            <button class="btn outline" onclick="location.reload()">초기화</button>
          </div>
          <div id="error-message" class="error-message hidden"></div>
          <div id="success-message" class="success-message hidden"></div>
        </div>

        <!-- 분석 결과 -->
        <div class="score-card card">
          <div class="card-title">손글씨 점수</div>
          <div class="score-flex">
            <div class="score-circle" id="score-result">-</div>
            <div class="highlight-box2 small" id="feedback-text">분석 후 결과가 여기에 표시됩니다.</div>
          </div>
        </div>

        <!-- 교정 텍스트 -->
        <div class="latter-card card">
          <div class="card-title">인식된 글자</div>
          <p id="corrected-text" class="correct-text"></p>
        </div>

        <!-- 피드백 결과 -->
        <div class="feedback-card card">
          <div class="card-title">손글씨 피드백</div>
          <ul id="error-list" class="fb-row"></ul>
        </div>

      </div>
    </div>
  </div>

  <footer class="footer-copyright">
    © 2025 바른글씨. All rights reserved.
  </footer>

  <script>
    let selectedFile = null;
    let todaySentence = "";
    let countdown = 60;
    let timerInterval = null;
    let timerExpired = false;
    let submitted = false;

    async function loadDailySentence(force = false) {
      const res = await fetch(`http://${window.location.hostname}:8000/daily_sentence`);
      const data = await res.json();
      if (force && data.sentence === todaySentence) {
        return loadDailySentence(true);
      }
      todaySentence = data.sentence;
      document.getElementById("daily-sentence").textContent = todaySentence;
    }

    function refreshSentence() {
      loadDailySentence(true);
    }

    function startTimer() {
      clearInterval(timerInterval);
      countdown = 60;
      timerExpired = false;
      document.getElementById("timer-display").textContent = `${countdown}초 남음`;

      timerInterval = setInterval(() => {
        countdown--;
        document.getElementById("timer-display").textContent = `${countdown}초 남음`;

        if (countdown <= 0) {
          clearInterval(timerInterval);
          timerExpired = true;
          document.getElementById("timer-display").textContent = "시간 초과!";
          alert("60초 내에 제출하지 않아 챌린지가 종료되었습니다.");
        }
      }, 1000);
    }

    function previewImage() {
      const input = document.createElement("input");
      input.type = "file";
      input.accept = "image/*";
      input.onchange = e => {
        const file = e.target.files[0];
        if (!file) return;
        selectedFile = file;

        const preview = document.getElementById("preview");
        const reader = new FileReader();
        reader.onload = ev => {
          preview.src = ev.target.result;
          preview.classList.remove("hidden");
          document.querySelector('.upload-info').style.display = 'none';
          document.querySelector('.btn.gray').style.display = 'none';
        };
        reader.readAsDataURL(file);
      };
      input.click();
    }
    // 이미지 드래그 업로드
    const uploadBox = document.querySelector('.upload-box');

    uploadBox.addEventListener('dragover', e => {
      e.preventDefault();
      uploadBox.classList.add('dragover');
    });

    uploadBox.addEventListener('dragleave', e => {
      e.preventDefault();
      uploadBox.classList.remove('dragover');
    });

    uploadBox.addEventListener('drop', e => {
      e.preventDefault();
      uploadBox.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (!file) return;
      selectedFile = file;

      const reader = new FileReader();
      reader.onload = ev => {
        document.getElementById("preview").src = ev.target.result;
        document.getElementById("preview").classList.remove("hidden");
        document.querySelector('.upload-info').style.display = 'none'; //설명 숨기기
        document.querySelector('.btn.gray').style.display = 'none'; //파일 올리기 숨기기
      };
      reader.readAsDataURL(file);
    });

    async function submitImage() {
      const errorMsg = document.getElementById("error-message");
      const successMsg = document.getElementById("success-message");
      errorMsg.classList.add("hidden");
      successMsg.classList.add("hidden");

      if (timerExpired) {
        alert("제한 시간이 초과되었습니다. 다시 시도해주세요.");
        return;
      }

      if (!selectedFile) {
        alert("이미지를 선택해주세요!");
        return;
      }

      const loadingEl = document.querySelector('.loading');
      loadingEl.classList.remove('hidden');
      document.body.style.overflow = 'hidden';

      const formData = new FormData();
      formData.append("file", selectedFile);
      formData.append("target", todaySentence);

      try {
        const res = await fetch(`http://${window.location.hostname}:8000/evaluate`, {
          method: "POST",
          body: formData,
        });

        const result = await res.json();

        const cleanText = result.recognized_text?.trim().replace(/\s/g, "");
        const targetClean = todaySentence.trim().replace(/\s/g, "");

        if (cleanText !== targetClean) {
          errorMsg.textContent = "문장이 일치하지 않습니다. 다시 작성해주세요.";
          errorMsg.classList.remove("hidden");
          return;
        }

        clearInterval(timerInterval); // ⬅️ 타이머 정지 추가
        document.getElementById("score-result").textContent = `${result.score}점`;
        document.getElementById("feedback-text").innerHTML = result.feedback;

        const errorList = document.getElementById("error-list");
        errorList.innerHTML = "";
        result.feedback.split(/<br>/).forEach(line => {
          if (line.trim()) {
            const li = document.createElement("li");
            li.innerHTML = line.trim();
            errorList.appendChild(li);
          }
        });

        const correctedText = document.getElementById("corrected-text");
        correctedText.innerHTML = "";
        if (result.char_scores) {
          for (const [char, score] of Object.entries(result.char_scores)) {
            const span = document.createElement("span");
            span.style.marginRight = "10px";
            span.textContent = `${char}(${score}점)`;
            correctedText.appendChild(span);
          }
        } else {
          correctedText.textContent = result.corrected_text;
        }

        successMsg.textContent = "✅ 제한 시간 내에 성공적으로 제출했습니다!";
        successMsg.classList.remove("hidden");

      } catch (err) {
        console.error("분석 오류:", err);
        alert("서버 오류 또는 연결 실패");
      } finally {
        loadingEl.classList.add('hidden');
        document.body.style.overflow = '';
      }
    }

    window.onload = () => {
      loadDailySentence();
      startTimer(); // 페이지 진입 시 타이머 시작
    }
  </script>
</body>
</html>
