<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오늘의 손글씨</title>
  <link rel="stylesheet" href="/static/globals.css">
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .hidden { display: none; }
    .error-message { color: red; margin-top: 10px; font-weight: bold; }
    .refresh-button {
      margin-left: 10px;
      font-size: 14px;
      padding: 4px 8px;
      background-color: #eee;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="layout-bg">
    <div class="main-wrap">
      <div class="logo-title">
        <img class="logo-image" src="/static/image/logo1.png" alt="logo">
        바른글씨 - 오늘의 문장
      </div>

      <!-- 오늘의 문장 표시 -->
      <div class="card today-sentence-card">
        <div class="card-title">
          오늘의 손글씨 문장
          <button class="refresh-button" onclick="refreshSentence()">🔄 새 문장</button>
        </div>
        <div class="highlight-box1" id="daily-sentence">불러오는 중...</div>
      </div>

      <!-- 업로드 카드 -->
      <div class="card upload-card">
        <div class="card-title">손글씨 이미지 업로드</div>
        <div class="upload-box">
          <img id="preview" class="preview-image hidden" alt="미리보기 이미지">
          <div class="upload-info">이미지를 선택하거나 드래그하세요. (JPG/PNG)</div>
          <button class="btn blue1" onclick="previewImage()">손글씨 올리기</button>
        </div>
        <div class="btns">
          <button class="btn gray" onclick="submitImage()">분석하기</button>
          <button class="btn outline" onclick="location.reload()">초기화</button>
        </div>
        <div id="error-message" class="error-message hidden"></div>
      </div>

      <!-- 분석 결과 -->
      <div class="card score-card">
        <div class="card-title">분석 결과</div>
        <div class="score-flex">
          <div class="score-circle" id="score-result">-</div>
          <div class="highlight-box2" id="feedback-text">분석 결과가 여기에 표시됩니다.</div>
        </div>
      </div>

      <!-- 교정 이미지 -->
      <div class="card">
        <div class="card-title">교정된 이미지</div>
        <img id="corrected-image" class="preview-image hidden" alt="교정 이미지">
      </div>
    </div>
  </div>

  <script>
    let selectedFile = null;
    let todaySentence = "";

    async function loadDailySentence(force = false) {
      const res = await fetch(`http://${window.location.hostname}:8000/daily_sentence`);
      const data = await res.json();
      if (force && data.sentence === todaySentence) {
        return loadDailySentence(true); // 중복 방지
      }
      todaySentence = data.sentence;
      document.getElementById("daily-sentence").textContent = todaySentence;
    }

    function refreshSentence() {
      loadDailySentence(true);
    }

    window.onload = () => loadDailySentence();

    function previewImage() {
      const input = document.createElement("input");
      input.type = "file";
      input.accept = "image/*";
      input.onchange = e => {
        const file = e.target.files[0];
        if (!file) return;
        selectedFile = file;

        const reader = new FileReader();
        reader.onload = ev => {
          document.getElementById("preview").src = ev.target.result;
          document.getElementById("preview").classList.remove("hidden");
        };
        reader.readAsDataURL(file);
      };
      input.click();
    }

    async function submitImage() {
        const errorMsg = document.getElementById("error-message");
        errorMsg.classList.add("hidden");

        if (!selectedFile) {
            alert("이미지를 선택해주세요!");
            return;
        }

        const formData = new FormData();
        formData.append("file", selectedFile);
        formData.append("target", todaySentence);

        try {
            const res = await fetch(`http://${window.location.hostname}:8000/evaluate`, {
            method: "POST",
            body: formData,
            });

            const result = await res.json();

            // 공백 제거 후 문장 비교
            const cleanText = result.recognized_text?.trim().replace(/\s/g, "");
            const targetClean = todaySentence.trim().replace(/\s/g, "");

            if (cleanText !== targetClean) {
            errorMsg.textContent = "문장이 일치하지 않습니다. 다시 작성해주세요.";
            errorMsg.classList.remove("hidden");
            return;
            }

            // 정상 결과 처리
            document.getElementById("score-result").textContent = `${result.score}점`;
            document.getElementById("feedback-text").innerHTML = result.feedback;
            const img = document.getElementById("corrected-image");
            img.src = result.corrected_image;
            img.classList.remove("hidden");

        } catch (err) {
            console.error("분석 오류:", err);
            alert("서버 오류 또는 연결 실패");
        }
    }

  </script>
</body>
</html>
