<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>내 프로필</title>
  <link rel="stylesheet" href="/static/globals.css?v=333">
  <link rel="stylesheet" href="/static/styleguide.css?v=333">
  <link rel="stylesheet" href="/static/style.css?v=334">
  <style>.box{max-width:720px;margin:40px auto;background:#fff;border-radius:12px;padding:20px;border:1px solid #e5e7eb}</style>
</head>
<body class="layout-bg">
  <div class="box">
    <h2>내 정보</h2>
    <div id="user"></div>
    <hr style="margin:16px 0;">
    <h2>점수 기록</h2>
    <table class="table">
      <thead><tr><th>날짜</th><th>문장</th><th>점수</th></tr></thead>
      <tbody id="rows"></tbody>
    </table>
  </div>

  <script>
    async function loadProfile(){
      const token = localStorage.getItem('access_token');
      if(!token){ location.href='/login.html'; return; }
      const res = await fetch('/user/profile', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if(!res.ok){
        localStorage.removeItem('access_token');
        location.href='/login.html'; return;
      }
      const j = await res.json();
      document.getElementById('user').textContent =
        `${j.user.nickname} (@${j.user.username}) — 가입일: ${new Date(j.user.created_at).toLocaleString()}`;

      const tbody = document.getElementById('rows');
      tbody.innerHTML = '';
      for(const s of j.scores){
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${new Date(s.created_at).toLocaleString()}</td>
                        <td>${escapeHtml(s.text)}</td>
                        <td>${s.score}</td>`;
        tbody.appendChild(tr);
      }
    }
    function escapeHtml(str){ return str.replace(/[&<>"']/g, s=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;', "'":'&#39;' }[s])); }
    loadProfile();
  </script>
</body>
</html>
