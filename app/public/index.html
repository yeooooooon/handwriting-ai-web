<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>바른 글씨 - 손글씨 업로드</title>
  <link rel="stylesheet" href="/static/globals.css?v=333">
  <link rel="stylesheet" href="/static/styleguide.css?v=333">
  <link rel="stylesheet" href="/static/style.css?v=333">
  <style>
    .hidden { display:none; }
    /* 글자별 점수 칩 */
    .char-scores { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:8px; margin-top:12px; }
    .score-chip { padding:8px 10px; border-radius:10px; text-align:center; font-weight:600; font-size:14px; }
    .chip-good { background:#dcfce7; }   /* >=90 */
    .chip-ok   { background:#fef3c7; }   /* 70~89 */
    .chip-bad  { background:#fee2e2; }   /* <70  */
    .muted { color:#64748b; font-size:12px; }

    /* 파란 박스 내부 구간 요약을 4열 그리드로 정렬 */
    .score-lines { display: grid; row-gap: 6px; }
    .score-lines .line {
      display: grid;
      grid-template-columns: 70px 90px 10px 1fr; /* ← 필요하면 숫자만 조절 */
      column-gap: 6px;
      align-items: baseline;
    }
    .score-lines .label { font-weight: 700; }
    .score-lines .note  { color:#334155; opacity:.9; white-space: nowrap; } /* 설명은 줄바꿈 안 함 */
    .score-lines .colon { text-align: center; }
    .score-lines .chars { word-break: keep-all; } /* 글자 목록은 자기 칸에서만 줄바꿈 */

    /* 헤더 우측 액션 영역(로그인/회원가입/홈) */
    .site-header { display:flex; justify-content:space-between; align-items:center; gap:12px; }
    .site-header .header-actions { display:flex; align-items:center; gap:12px; }
    .site-header .header-actions a { font-weight:600; text-decoration:none; color:#0f172a; }
    .site-header .header-actions a:hover { text-decoration:underline; }
  </style>
  <link rel="shortcut icon" href="/static/image/favicon.ico">
  <link rel="icon" href="/static/image/favicon.ico">
</head>
<body>
  <div class="loading hidden"><div class="loading-spinner"></div></div>

  <header class="site-header">
    <h1 class="logo">
      <a href="/" class="logo-title">
        <img class="logo-image" src="/static/image/logo2.png" alt="로고">바른 글씨 - 손글씨 업로드
      </a>
    </h1>
    <div class="header-actions">
      <!-- ▼ 추가: 회원가입/로그인 버튼 (JS가 클릭 핸들러와 라벨을 바인딩) -->
      <a class="sign-up" href="javascript:void(0)">회원가입</a>
      <a class="login" href="javascript:void(0)">로그인</a>
      <a href="/"><img class="home-image" src="/static/image/home.png" alt="홈"></a>
    </div>
  </header>

  <div class="layout-bg">
    <div class="main-wrap">
      <div class="cards-container">
        <!-- 입력 카드 -->
        <div class="upload-card">
          <div class="card-title">입력 방식 선택</div>
          <div class="upload-desc">이미지를 업로드하거나, 실시간 쓰기 패드에서 직접 적어 제출할 수 있습니다.</div>

          <div class="tabbar">
            <button class="tab-btn active" id="tab-upload">이미지 업로드</button>
            <button class="tab-btn" id="tab-draw">실시간 쓰기 (베타)</button>
          </div>

          <div id="panel-upload">
            <div class="upload-box">
              <img id="preview" class="preview-image hidden" alt="미리보기 이미지">
              <div class="upload-info">이미지를 선택하거나 여기에 드래그하세요.<br><br> JPG, JPEG, PNG 및 WEBP. 최대 20MB.</div>
              <button class="btn gray" onclick="previewImage()">파일 올리기</button>
            </div>
          </div>

          <div id="panel-draw" class="hidden">
            <div class="canvas-wrap">
              <div class="pad-toolbar">
                <div class="row">
                  <label>펜 두께</label>
                  <input id="penSize" type="range" min="1" max="20" value="4">
                  <span id="penSizeVal">4px</span>
                </div>
                <div class="row">
                  <label>펜 색상</label>
                  <input id="penColor" type="color" value="#111111">
                </div>
                <div class="row">
                  <label><input id="pressureToggle" type="checkbox" checked> 압력 반영</label>
                </div>
                <div class="row">
                  <button class="btn slate" id="undoBtn" type="button">되돌리기</button>
                  <button class="btn gray2" id="eraseToggle" type="button">지우개 OFF</button>
                  <button class="btn red" id="clearBtn" type="button">전체 지우기</button>
                </div>
              </div>
              <div class="pad-canvas-box">
                <canvas id="pad" class="pad-canvas"></canvas>
              </div>
              <div class="note">팁: 펜/터치 지원 기기는 필압(e.pressure)에 따라 선 굵기가 변합니다.</div>
            </div>
          </div>

          <div class="btns" style="margin-top:12px;">
            <button class="btn blue1" onclick="submitImage()">분석하기</button>
            <button class="btn outline" onclick="location.reload()">초기화</button>
          </div>
        </div>

        <!-- 점수 영역 -->
        <div class="score-card">
          <div class="card-title">손글씨 점수</div>
          <div class="score-flex">
            <div class="score-circle" id="score-result">-</div>
            <div class="highlight-box2 small" id="feedback-text">
              분석 후 결과가 여기에 표시됩니다.
            </div>
          </div>
          <!-- 글자별 점수 칩 -->
          <div id="char-scores" class="char-scores"></div>
        </div>

        <!-- 인식된 글자 -->
        <div class="latter-card">
          <div class="card-title">인식된 글자</div>
          <p id="corrected-text" class="correct-text"></p>
        </div>

        <!-- 피드백 결과 -->
        <div class="feedback-card">
          <div class="card-title">손글씨 피드백</div>
          <div id="error-list" class="fb-row"></div>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer-copyright">
    © 2025 바른글씨. All rights reserved.
  </footer>

  <script>
    const API_BASE = `${location.protocol}//${location.hostname}:8000`;
    let selectedFile = null;
    let mode = 'upload';
    let pad = null;

    /* =========================
       ▼ 인증/로그인 유틸 (파일 기반 세션)
       ========================= */
    const Auth = {
      get token() { return localStorage.getItem('token') || ''; },
      set token(v) { v ? localStorage.setItem('token', v) : localStorage.removeItem('token'); },
      get username() { return localStorage.getItem('username') || ''; },
      set username(v) { v ? localStorage.setItem('username', v) : localStorage.removeItem('username'); }
    };

    async function signupPrompt() {
      const username = prompt("회원가입 - 아이디");
      if (!username) return;
      const password = prompt("회원가입 - 비밀번호(보안 없음, 데모용)");
      if (!password) return;
      const res = await fetch(`/auth/register`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ username, password })
      });
      const data = await res.json().catch(()=>({}));
      if (!res.ok) { alert(data.detail || "회원가입 실패"); return; }
      alert("회원가입 완료. 로그인 해주세요.");
    }

    async function loginPrompt() {
      const username = prompt("로그인 - 아이디");
      if (!username) return;
      const password = prompt("로그인 - 비밀번호");
      if (!password) return;
      const res = await fetch(`/auth/login`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ username, password })
      });
      const data = await res.json().catch(()=>({}));
      if (!res.ok || !data.token) { alert(data.detail || "로그인 실패"); return; }
      Auth.token = data.token;
      Auth.username = data.username || username;
      renderAuthButtons();
      alert(`${Auth.username}님 로그인되었습니다.`);
    }

    function logout() {
      Auth.token = '';
      Auth.username = '';
      renderAuthButtons();
      alert("로그아웃 되었습니다.");
    }

    function renderAuthButtons() {
      const loginA = document.querySelector('header .login');
      const signupA = document.querySelector('header .sign-up');
      if (!loginA || !signupA) return;

      if (Auth.token) {
        loginA.textContent = `${Auth.username} (로그아웃)`;
        loginA.href = "javascript:void(0)";
        loginA.onclick = () => logout();
        signupA.style.display = 'none';
      } else {
        loginA.textContent = "로그인";
        loginA.href = "javascript:void(0)";
        loginA.onclick = () => loginPrompt();
        signupA.textContent = "회원가입";
        signupA.href = "javascript:void(0)";
        signupA.onclick = () => signupPrompt();
        signupA.style.display = '';
      }
    }

    // 인증 포함 fetch 래퍼
    async function fetchWithAuth(url, opts = {}) {
      const headers = new Headers(opts.headers || {});
      if (Auth.token) headers.set('Authorization', `Bearer ${Auth.token}`);
      return fetch(url, { ...opts, headers });
    }

    /* =========================
       ▼ 업로드/패드/렌더 유틸
       ========================= */
    function previewImage() {
      const input = document.createElement("input");
      input.type = "file";
      input.accept = "image/*";
      input.onchange = e => {
        const file = e.target.files[0];
        if (!file) return;
        selectedFile = file;

        const preview = document.getElementById("preview");
        const reader = new FileReader();
        reader.onload = ev => {
          preview.src = ev.target.result;
          preview.classList.remove("hidden");
          document.querySelector('.upload-info').style.display = 'none';
          document.querySelector('.btn.gray').style.display = 'none';
        };
        reader.readAsDataURL(file);
      };
      input.click();
    }

    (function initDnd(){
      const uploadBox = document.querySelector('.upload-box');
      if (!uploadBox) return;
      uploadBox.addEventListener('dragover', e => { e.preventDefault(); uploadBox.classList.add('dragover'); });
      uploadBox.addEventListener('dragleave', e => { e.preventDefault(); uploadBox.classList.remove('dragover'); });
      uploadBox.addEventListener('drop', e => {
        e.preventDefault(); uploadBox.classList.remove('dragover');
        const file = e.dataTransfer.files[0];
        if (!file) return;
        selectedFile = file;
        const reader = new FileReader();
        reader.onload = ev => {
          document.getElementById("preview").src = ev.target.result;
          document.getElementById("preview").classList.remove("hidden");
          document.querySelector('.upload-info').style.display = 'none';
          document.querySelector('.btn.gray').style.display = 'none';
        };
        reader.readAsDataURL(file);
      });
    })();

    // ===== 캔버스 패드 =====
    class HandwritingPad {
      constructor(canvas) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d', { willReadFrequently:true });
        this.strokeStyle = '#111111';
        this.baseSize = 4;
        this.usePressure = true;
        this.isErasing = false;
        this.paths = [];
        this.currentPath = null;

        this.resize();
        window.addEventListener('resize', () => this.resize());
        this._bindPointerEvents();
        this._drawGrid();
      }
      setStrokeStyle(color){ this.strokeStyle = color; }
      setBaseSize(px){ this.baseSize = px; }
      setUsePressure(on){ this.usePressure = on; }
      toggleEraser(){ this.isErasing = !this.isErasing; return this.isErasing; }

      clear(){
        const rect=this.canvas.getBoundingClientRect();
        this.ctx.save();
        this.ctx.globalCompositeOperation='source-over';
        this.ctx.fillStyle='#ffffff';
        this.ctx.fillRect(0,0,rect.width,rect.height);
        this.ctx.restore();
        this._drawGrid();
        this.paths=[];
      }
      undo(){ if(!this.paths.length) return; this.paths.pop(); this._redrawAll(); }

      async toBlobWhiteBg(){
        const rect=this.canvas.getBoundingClientRect();
        const dpr=window.devicePixelRatio||1;
        const off=document.createElement('canvas');
        off.width=Math.round(rect.width*dpr);
        off.height=Math.round(rect.height*dpr);
        const octx=off.getContext('2d');
        octx.scale(dpr,dpr);
        octx.fillStyle='#ffffff';
        octx.fillRect(0,0,rect.width,rect.height);
        octx.drawImage(this.canvas,0,0);
        return await new Promise(r=>off.toBlob(r,'image/png',1.0));
      }

      resize(){
        const rect=this.canvas.getBoundingClientRect();
        if(!rect.width||!rect.height) return;
        const dpr=window.devicePixelRatio||1;
        this.canvas.width=Math.round(rect.width*dpr);
        this.canvas.height=Math.round(rect.height*dpr);
        this.ctx.setTransform(dpr,0,0,dpr,0,0);
        this.ctx.fillStyle='#ffffff';
        this.ctx.fillRect(0,0,rect.width,rect.height);
        this._drawGrid();
        this._redrawAll();
      }

      _drawGrid(){
        const rect=this.canvas.getBoundingClientRect(), ctx=this.ctx;
        ctx.save(); ctx.strokeStyle='#e2e8f0'; ctx.lineWidth=1;
        const h=rect.height, margin=16, mid=Math.round(h/2);
        ctx.beginPath();
        ctx.moveTo(margin, mid-40); ctx.lineTo(rect.width-margin, mid-40);
        ctx.moveTo(margin, mid);    ctx.lineTo(rect.width-margin, mid);
        ctx.moveTo(margin, mid+40); ctx.lineTo(rect.width-margin, mid+40);
        ctx.stroke(); ctx.restore();
      }

      _bindPointerEvents(){
        const c=this.canvas;
        const onDown=(e)=>{ e.preventDefault(); c.setPointerCapture(e.pointerId);
          this.currentPath={points:[], erase:this.isErasing, color:this.strokeStyle, size:this.baseSize, pressure:this.usePressure};
          this.paths.push(this.currentPath); this._addPoint(e); };
        const onMove=(e)=>{ if(!this.currentPath) return; this._addPoint(e,true); };
        const onUp=(e)=>{ if(!this.currentPath) return; this._addPoint(e,true); this.currentPath=null; c.releasePointerCapture(e.pointerId); };
        c.addEventListener('pointerdown', onDown, {passive:false});
        c.addEventListener('pointermove', onMove, {passive:false});
        c.addEventListener('pointerup', onUp, {passive:false});
        c.addEventListener('pointercancel', onUp, {passive:false});
        c.addEventListener('touchstart', e=>e.preventDefault(), {passive:false});
        c.addEventListener('touchmove',  e=>e.preventDefault(), {passive:false});
      }

      _addPoint(e, draw=false){
        const rect=this.canvas.getBoundingClientRect();
        const x=e.clientX-rect.left, y=e.clientY-rect.top;
        const p=(this.usePressure && e.pressure)?e.pressure:1;
        this.currentPath.points.push({x,y,p});
        if(draw) this._redrawLastSegment(); else this._drawDot(x,y,p);
      }
      _strokeWidth(base,p){ const f=Math.max(0.3, Math.min(1.0,p)); return base*(this.usePressure?(0.6+f*0.8):1.0); }
      _redrawAll(){
        const rect=this.canvas.getBoundingClientRect(), ctx=this.ctx;
        ctx.save(); ctx.globalCompositeOperation='source-over'; ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,rect.width,rect.height); ctx.restore();
        this._drawGrid(); for(const path of this.paths) this._drawPath(path);
      }
      _drawPath(path){
        const ctx=this.ctx; ctx.save(); ctx.lineCap='round'; ctx.lineJoin='round';
        ctx.globalCompositeOperation=path.erase?'destination-out':'source-over'; ctx.strokeStyle=path.color;
        const pts=path.points;
        if(pts.length===1){ const w=this._strokeWidth(path.size, pts[0].p);
          ctx.beginPath(); ctx.arc(pts[0].x, pts[0].y, w/2, 0, Math.PI*2);
          ctx.fillStyle=path.erase?'rgba(0,0,0,1)':path.color; ctx.fill(); ctx.restore(); return; }
        for(let i=1;i<pts.length;i++){ const a=pts[i-1], b=pts[i]; const w=this._strokeWidth(path.size, b.p);
          ctx.lineWidth=w; const cx=(a.x+b.x)/2, cy=(a.y+b.y)/2; ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.quadraticCurveTo(a.x,a.y,cx,cy); ctx.stroke(); }
        ctx.restore();
      }
      _redrawLastSegment(){ const path=this.paths[this.paths.length-1]; if(!path) return; const lastTwo={...path, points:path.points.slice(-2)}; this._drawPath(lastTwo); }
      _drawDot(x,y,p){ const ctx=this.ctx; ctx.save(); ctx.globalCompositeOperation=this.isErasing?'destination-out':'source-over';
        ctx.fillStyle=this.isErasing?'rgba(0,0,0,1)':this.strokeStyle; const r=this._strokeWidth(this.baseSize,p)/2;
        ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill(); ctx.restore(); }
    }

    // 글자별 점수 칩 렌더
    function renderCharScores(items){
      const box = document.getElementById('char-scores');
      box.innerHTML = '';
      if (!items || !items.length) {
        box.innerHTML = '<div class="muted">글자별 점수를 표시할 수 없습니다.</div>';
        return;
      }
      items.forEach(({char, score})=>{
        const chip = document.createElement('div');
        let cls = (score < 70) ? 'chip-bad' : (score < 90 ? 'chip-ok' : 'chip-good');
        chip.className = `score-chip ${cls}`;
        chip.textContent = `${char} ${score}점`;
        box.appendChild(chip);
      });
    }

    // 파란 박스용: 구간 요약 HTML 생성
    function buildRangeSummary(items){
      const buckets = { bad:[], ok:[], good:[] }; // <70 / 70~89 / 90~
      (items||[]).forEach(({char,score})=>{
        const ch=(char||'').trim(); if(!ch) return;
        const s=Number(score)||0;
        if(s>=90) buckets.good.push(ch);
        else if(s>=70) buckets.ok.push(ch);
        else buckets.bad.push(ch);
      });

      const row = (range, note, arr) => `
        <div class="line">
          <span class="label">${range}</span>
          <span class="note">(${note})</span>
          <span class="colon">:</span>
          <span class="chars">${arr.length ? arr.join(', ') : '-'}</span>
        </div>`;

      return `<div class="score-lines">
        ${row('0~69점',   '부족한 글씨',      buckets.bad)}
        ${row('70~89점',  '조금 부족한 글씨', buckets.ok)}
        ${row('90~100점', '완벽한 글씨',      buckets.good)}
      </div>`;
    }

    async function submitImage() {
      const loadingEl = document.querySelector('.loading');
      loadingEl.classList.remove('hidden');
      document.body.style.overflow = 'hidden';
      try {
        let fileToSend = null;
        if (mode === 'upload') {
          if (!selectedFile) { alert("이미지를 선택해주세요!"); return; }
          fileToSend = selectedFile;
        } else {
          const blob = await pad.toBlobWhiteBg();
          if (!blob) { alert("캔버스 이미지를 생성하지 못했습니다."); return; }
          fileToSend = new File([blob], "handwriting.png", { type: "image/png" });
        }

        const formData = new FormData();
        formData.append("file", fileToSend);

        // ▼ 변경: 인증 토큰을 자동으로 포함
        const res = await fetchWithAuth(`${API_BASE}/api/gpt/evaluate`, { method: "POST", body: formData });
        const result = await res.json();
        if (!res.ok) { alert("분석 실패: " + (result.detail || res.status)); return; }

        // 인식 문장
        document.getElementById("corrected-text").textContent = result.corrected_text || result.recognized_text || '';

        // 숫자 점수
        document.getElementById("score-result").textContent = `${result.score}점`;

        // 글자별 점수 칩
        const seq = result.char_scores_seq || Object.entries(result.char_scores || {}).map(([char,score])=>({char,score}));
        renderCharScores(seq);

        // 파란 박스: 구간 요약 표시
        document.getElementById("feedback-text").innerHTML = buildRangeSummary(seq);

        // 하단 카드: GPT 피드백
        const errorList = document.getElementById("error-list");
        errorList.innerHTML = result.feedback.replace(/<br>/g, '\n');
        errorList.style.whiteSpace = 'pre-line';

      } catch (err) {
        console.error("분석 중 오류:", err);
        alert("서버 연결 실패 또는 오류 발생");
      } finally {
        loadingEl.classList.add('hidden');
        document.body.style.overflow = '';
      }
    }

    // ===== 탭 =====
    function initTabs(){
      const tabUpload=document.getElementById('tab-upload');
      const tabDraw=document.getElementById('tab-draw');
      const panelUpload=document.getElementById('panel-upload');
      const panelDraw=document.getElementById('panel-draw');
      const activate=(m)=>{
        mode=m;
        tabUpload.classList.toggle('active', m==='upload');
        tabDraw.classList.toggle('active', m==='draw');
        panelUpload.classList.toggle('hidden', m!=='upload');
        panelDraw.classList.toggle('hidden', m!=='draw');
        if (m==='draw') requestAnimationFrame(()=>{ if(pad) pad.resize(); });
      };
      tabUpload.addEventListener('click', ()=>activate('upload'));
      tabDraw.addEventListener('click', ()=>activate('draw'));
      activate('upload');
    }

    // ===== 패드 초기화 =====
    function initPad(){
      const canvas=document.getElementById('pad');
      pad=new HandwritingPad(canvas);
      const size=document.getElementById('penSize');
      const sizeVal=document.getElementById('penSizeVal');
      size.addEventListener('input', ()=>{ sizeVal.textContent=size.value+'px'; pad.setBaseSize(Number(size.value)); });
      const color=document.getElementById('penColor');
      color.addEventListener('input', ()=> pad.setStrokeStyle(color.value));
      const press=document.getElementById('pressureToggle');
      press.addEventListener('change', ()=> pad.setUsePressure(press.checked));
      document.getElementById('undoBtn').addEventListener('click', ()=> pad.undo());
      const eraseToggle=document.getElementById('eraseToggle');
      eraseToggle.addEventListener('click', ()=>{ const on=pad.toggleEraser(); eraseToggle.textContent=on?'지우개 ON':'지우개 OFF'; });
      document.getElementById('clearBtn').addEventListener('click', ()=> pad.clear());
    }

    // 초기화
    window.onload = () => {
