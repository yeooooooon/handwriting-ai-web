<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>바른글씨</title>
  <link rel="stylesheet" href="/static/style.css?v=333">
  <link rel="stylesheet" href="/static/globals.css?v=333">
  <link rel="stylesheet" href="/static/styleguide.css?v=333">
  <!-- Pretendard, Paperlogy 폰트는 필요시 링크 추가!. -->
</head>
<body>
  <div class="layout-bg">
    <div class="main-wrap">
      <div class="logo-title">바른글씨</div>
        <div class="grid-2x2">
        <div class="card today-sentence-card">
          <div class="card-title">오늘의 손글씨 문장</div>
          <div class="highlight-box1">저 넓은 세상에서 큰 꿈을 펼쳐라.</div>
        </div>
        <div class="card score-card">
          <div class="card-title">손글씨 점수</div>
          <div class="score-flex">
            <div class="score-circle">96점</div>
            <div class="highlight-box2 small">
              획의 굵기가 일정해졌어요. 다음 단계도 도전해보세요!<br>
              글자 간격이 아주 짜임새 있어요. 꾸준히 연습해요!
            </div>
          </div>
        </div>
        <div class="card upload-card">
          <div class="card-title">손글씨 이미지 업로드</div>
          <div class="upload-desc">JPG, PNG 형식의 손글씨 이미지를 선택하거나 드래그하여 업로드하세요.</div>
          <div class="upload-box">
            <div class="upload-icon">
              <div class="upload-filelabel">바른<br>글씨</div>
            </div>
            <div class="upload-info">이미지를 선택하거나 여기에 드래그하세요.<br>JPG, JPEG, PNG 및 WEBP. 최대 20MB.</div>
            <button class="btn blue1">손글씨 올리기</button>
          </div>
          <div class="btns">
            <button class="btn gray">분석하기</button>
            <button class="btn outline">초기화</button>
          </div>
        </div>
        <div class="card feedback-card">
          <div class="card-title">손글씨 피드백</div>
          <div class="fb-row">자간을 조금 더 넓혀보세요</div>
          <div class="fb-row">글자 기울기를 줄이면 더 깔끔해집니다</div>
          <div class="fb-row">획 간 간격을 일정하게 맞춰보세요</div>
          <div class="btns">
            <button class="btn upload">다시 올리기</button>
            <button class="btn blue2">다른 문장 쓰기</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
