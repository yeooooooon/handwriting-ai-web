<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 손글씨 교정 플랫폼</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .fade-in {
      animation: fadeIn 0.5s ease-in-out forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-gray-100 text-gray-800 text-lg">

  <!-- Header -->
  <header class="flex justify-between items-center px-6 py-5 bg-gray-200 shadow">
    <h1 class="text-2xl font-bold text-gray-800">✍ 바른글씨</h1>
    <nav class="space-x-6">
      <a href="#" class="text-gray-700 hover:text-gray-900 font-medium">사용법</a>
      <a href="#" class="text-gray-700 hover:text-gray-900 font-medium">문의하기</a>
      <button class="bg-gray-700 text-white px-4 py-2 rounded-lg text-base hover:bg-gray-800">설정</button>
    </nav>
  </header>

  <!-- Main Content -->
  <main class="max-w-5xl mx-auto mt-10 px-6">

    <!-- 손글씨 입력 섹션 -->
    <section class="bg-gray-200 p-8 rounded-2xl shadow w-full mb-10">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-xl font-semibold text-gray-900">📝 손글씨 입력</h2>
        <button onclick="toggleQuest()" class="bg-gray-700 text-white text-base px-4 py-2 rounded-lg hover:bg-gray-800 flex items-center gap-2">
          📋 일일 퀘스트
        </button>
      </div>

      <!-- 퀘스트 박스 -->
      <div id="quest-box" class="hidden bg-white border border-gray-400 rounded-xl p-6 mb-6 text-gray-800 space-y-4">
        <p class="text-lg font-medium">오늘의 퀘스트 ✍</p>
        <p class="bg-gray-100 p-4 rounded text-xl leading-relaxed text-center">
          "바른 글씨는 바른 마음에서 나옵니다."<br>
          "글씨는 그 사람의 인상을 결정짓습니다."
        </p>
        <button onclick="completeQuest()" class="bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 text-lg">글씨 업로드하기</button>
        <div id="quest-result" class="hidden mt-6 bg-gray-100 p-4 rounded-lg text-gray-800">
          <p class="text-lg font-semibold">상위 18%입니다! 👑</p>
          <p class="text-gray-600 mt-1">이번 퀘스트를 완료하셨습니다.</p>
          <div class="mt-2 inline-block bg-green-500 text-white px-3 py-1 rounded-full text-sm">
            ✅ 퀘스트 완료
          </div>
        </div>
      </div>

      <!-- 업로드 입력창 + 미리보기 -->
      <div class="border border-dashed border-gray-400 bg-white rounded-xl h-[auto] p-6 flex flex-col items-center justify-center text-gray-500 text-xl mb-6">
        <p>손글씨 이미지를 업로드하세요</p>
        <input type="file" id="imageInput" accept="image/*" class="mt-4" onchange="previewImage()" />
        <img id="preview" class="mt-4 max-h-40 rounded border" alt="미리보기 이미지" />
        <button onclick="submitImage()" class="mt-4 bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 text-base">AI 분석 시작</button>
      </div>

      <!-- 예시 문장 -->
      <div class="mt-6">
        <h3 class="text-base font-semibold text-gray-800 mb-3">표준 글씨체 예시</h3>
        <div class="bg-gray-100 p-6 rounded-md text-center font-serif text-2xl tracking-wide text-gray-700">
          한글은 아름다운 문자입니다.
        </div>
      </div>
    </section>

    <!-- 분석 결과 섹션 -->
    <section id="analysis-section" class="hidden bg-gray-200 p-8 rounded-2xl shadow fade-in mb-10">
      <h2 class="text-xl font-semibold mb-6 text-gray-900">📊 분석 결과</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="bg-white p-6 rounded-xl text-center">
          <p class="text-base text-gray-600">유사도 점수</p>
          <p class="text-4xl font-bold text-gray-900 mt-3" id="score-result">-</p>
        </div>
        <div class="bg-white p-6 rounded-xl text-center">
          <p class="text-base text-gray-600">오류 항목</p>
          <ul id="error-list" class="text-base mt-3 text-red-600 space-y-2"></ul>
        </div>
      </div>

      <div class="mt-8">
        <h3 class="text-base font-semibold text-gray-800 mb-3">AI 피드백</h3>
        <div id="feedback-text" class="bg-white p-6 rounded-xl text-gray-700 text-base leading-relaxed">
          분석 결과가 여기에 표시됩니다.  
        </div>
      </div>

      <div class="mt-8 text-center">
        <h3 class="text-base font-semibold text-gray-800 mb-3">교정된 이미지</h3>
        <img id="corrected-image" class="inline-block rounded-xl border shadow" alt="교정 이미지" />
      </div>
    </section>

    <!-- 버튼 영역 -->
    <div class="flex flex-col md:flex-row gap-4 justify-between">
      <button onclick="showAnalysis()" class="w-full md:w-auto bg-gray-700 text-white px-6 py-3 rounded-xl hover:bg-gray-800 text-lg">
        교정 학습 시작
      </button>
      <button onclick="location.reload()" class="w-full md:w-auto bg-white text-gray-800 border border-gray-400 px-6 py-3 rounded-xl hover:bg-gray-200 text-lg">
        다시 입력하기
      </button>
    </div>
  </main>

  <!-- JavaScript -->
  <script>
    function toggleQuest() {
      document.getElementById('quest-box').classList.toggle('hidden');
    }

    function completeQuest() {
      document.getElementById('quest-result').classList.remove('hidden');
    }

    function showAnalysis() {
      const section = document.getElementById('analysis-section');
      section.classList.remove('hidden');
      section.scrollIntoView({ behavior: 'smooth' });
    }

    function previewImage() {
      const fileInput = document.getElementById("imageInput");
      const file = fileInput.files[0];
      const preview = document.getElementById("preview");
      if (file) {
        const reader = new FileReader();
        reader.onload = e => preview.src = e.target.result;
        reader.readAsDataURL(file);
      } else {
        preview.src = "";
      }
    }

    async function submitImage() {
      const fileInput = document.getElementById("imageInput");
      const file = fileInput.files[0];
      if (!file) return alert("이미지를 선택해주세요!");

      const formData = new FormData();
      formData.append("file", file);

      try {
        const res = await fetch(`http://${window.location.hostname}:8000/evaluate2`, {
          method: "POST",
          body: formData,
        });

        const result = await res.json();
        if (!res.ok) return alert("분석 실패: " + result.detail);

        document.getElementById("score-result").textContent = `${result.score}점`;

        const errorList = document.getElementById("error-list");
        errorList.innerHTML = "";
        result.feedback.split(/<br>/).forEach(line => {
          if (line.trim()) {
            const li = document.createElement("li");
            li.textContent = line.trim();
            errorList.appendChild(li);
          }
        });

        document.getElementById("feedback-text").innerHTML = result.feedback;
        document.getElementById("corrected-image").src = result.corrected_image;

        showAnalysis();

      } catch (err) {
        console.error("분석 중 오류 발생:", err);
        alert("서버 연결 실패 또는 오류 발생");
      }
    }
  </script>

</body>
</html>
