  <style>
    .hidden { display:none; }

    /* 상단 상태바 */
    .status-bar {
      display:flex; gap:12px; align-items:center; justify-content:center; text-align: center;
      padding:10px 14px; background:#eef2ff; border-radius:12px; margin-bottom:12px;
    }
    .pill { padding:6px 10px; background:white; border-radius:9999px; font-size: 13px; font-weight:600; }
    .status-left, .status-right { display:flex; gap:8px; align-items:center; }

    .status-right .btn {
      white-space: nowrap;   /* 줄바꿈 금지 */
      padding: 6px 14px;     /* 버튼 크기도 조금 넉넉하게 */
      margin-left: 6px;  /* pill과 버튼 사이 여백 */
    }

    /* 게임 영역 */
    .game-stage {
      position:relative; overflow:hidden; height:280px; background:#f8fafc;
      border-radius:14px; border:1px solid #e2e8f0;
    }
    .drop-word {
      position:absolute; top:-40px;
      font-size:28px; font-weight:800; color:#0f172a;
      text-shadow:0 2px 0 rgba(0,0,0,0.06);
      pointer-events:none;
      transition: transform .08s ease, color .1s ease;
    }
    /* 인식 대기 중 잠금된 단어 강조 */
    .drop-word.locked {
      color:#2563eb;
      transform: scale(1.05);
      text-shadow:0 3px 0 rgba(37,99,235,0.08);
      border-bottom:2px solid #93c5fd;
    }

    /* 인식 결과 미리보기 */
    .preview-box {
      background:#f1f5f9; border-radius:12px; padding:8px 12px; min-height:44px;
      white-space:pre-wrap;
    }

    /* 툴바 */
    .tool-row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }

    /* 리더보드 */
    .rank-list { display:grid; gap:8px; }
    .rank-item {
      display:grid; grid-template-columns:36px 1fr 90px; gap:12px; align-items:center;
      padding:8px 10px; background:#f8fafc; border-radius:10px; border:1px solid #e2e8f0;
    }
    .rank-me { background:#e0f2fe; border-color:#bae6fd; }
    .muted { color:#64748b; }

    /* ===== 결과 모달 ===== */
    .result-modal { 
      position: fixed; inset: 0; z-index: 9999; 
      display: none;
    }
    .result-modal.show { display:block; }

    .result-backdrop{
      position:absolute; inset:0; background: rgba(15,23,42,.45);
    }

    .result-panel{
      position:absolute; left:50%; top:50%;
      transform: translate(-50%, -50%);
      width:min(520px, 92vw);
      background:#fff; border-radius:16px;
      box-shadow: 0 20px 60px rgba(0,0,0,.18);
      padding: 22px 22px 18px;
    }

    .result-title{ font-size:22px; font-weight:800; margin:0 0 8px; }
    .result-sub{ color:#64748b; margin-bottom:16px; }

    .result-stats{
      display:grid; grid-template-columns: repeat(3, 1fr); gap:10px; margin:12px 0 18px;
    }
    .result-stat{
      background:#f8fafc; border:1px solid #e2e8f0;
      border-radius:12px; padding:12px; text-align:center;
    }
    .result-stat b{ font-size:22px; display:block; }

    .result-actions{ display:flex; gap:10px; justify-content:flex-end; }
    .result-actions .btn{ padding:10px 16px; }

    .result-close{
      position:absolute; right:10px; top:10px;
      border:none; background:transparent; font-size:18px; cursor:pointer;
    }

    /* 스크롤 잠금 시 바디 흔들림 방지 */
    .body-lock { overflow:hidden; }

      /* ===== 카드 확대 모드 ===== */
    .upload-card {
      position: relative;
    }

    .card-header {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      margin-bottom:8px;
    }

    .card-zoom-btn {
      border:none;
      background:#e5edff;
      border-radius:9999px;
      padding:4px 10px;
      font-size:12px;
      font-weight:600;
      cursor:pointer;
      display:flex;
      align-items:center;
      gap:4px;
      line-height:1;
    }
    .card-zoom-btn::before{
      content:"확대";
    }
    .card-zoom-btn:hover{
      background:#d4e2ff;
    }

    .card-expand-backdrop{
      position:fixed;
      inset:0;
      background:rgba(15,23,42,.45);
      z-index:9800;
    }

    /* 카드 ‘확대’ – 레이아웃 안에서만 크게 */
    /* 카드 확대 – 왼쪽/오른쪽으로 넓게 */
    .upload-card.expanded{
      position: fixed;
      top: 50%;
      transform: translateY(-50%);   /* Y축만 가운데 정렬 */
      max-height: 88vh;
      width: min(840px, 48vw);        /* 화면의 절반 가까이까지 넓게 */
      background: #ffffff;
      box-shadow: 0 24px 80px rgba(15,23,42,.35);
      z-index: 9850;
      overflow: auto;
    }

    /* 게임 카드 확대 시: 왼쪽 모니터 쪽으로 */
    /* #game-card.expanded{
      left: 3vw;
      right: auto;
    } */

    /* 패드 카드 확대 시: 오른쪽 모니터 쪽으로 */
    #pad-card.expanded{
      right: 15vw;
      left: auto;
    }

    /* 확대 상태에서 안쪽 높이만 조금 키워주기 */
    /* #game-card.expanded .game-stage{
      height: 60vh;
    } */
    #pad-card.expanded .pad-canvas-box{
      height: 45vh;
    }



    /* 확대 모드일 때 버튼 텍스트를 '축소'로 보이게 */
    .upload-card.expanded .card-zoom-btn::before{
      content:"축소";
    }


  </style>

  <script>
    // ================= 공통 설정 =================
    const API_BASE = `${location.protocol}//${location.hostname}:8000`;

    // 난이도/처리 관련 설정값 (조정 용이)
    const CONFIG = {
      SPAWN_EVERY_MS_INIT: 3000,     // 초기 스폰 간격 (↑ 늦출수록 쉬움)
      SPAWN_EVERY_MS_MIN: 1400,      // 최소 스폰 간격
      SPAWN_DEC_ON_HIT: 40,          // 정답 시 스폰 간격 감소폭 (작을수록 완만)
      SPEED_BASE_INIT: 20,           // 초기 낙하 속도(px/s) (↓ 낮출수록 느림)
      SPEED_INC_ON_HIT: 1,           // 정답 시 속도 증가폭
      SPEED_MAX: 120,                // 최대 속도 상한
      LOCK_TIMEOUT_MS: 4000,         // 인식 대기 중 단어 잠금 유지 최대 시간
      JPEG_W: 640, JPEG_H: 320,      // 업로드 다운스케일 해상도
      JPEG_Q: 0.7                    // JPEG 품질(0~1)
    };

    // Auth 토큰/이름 키 통일: index.html에서 쓰는 'token' 우선, 과거 'auth_token' 호환
    const Auth = {
      get token() {
        return localStorage.getItem('token') || localStorage.getItem('auth_token') || '';
      },
      get username() { // ★★★ username getter 추가
        return localStorage.getItem('username') || '';
      },
      clear() {
        localStorage.removeItem('token');
        localStorage.removeItem('auth_token');
        localStorage.removeItem('username');
      }
    };

    // 로그인 확인: 토큰이 있고 /auth/me가 200이면 OK
    async function ensureLogin() {
      const token = Auth.token;
      // if (!token) {
      //   alert("로그인이 필요합니다. 메인에서 로그인 후 다시 들어와 주세요.");
      //   location.href = "/"; // 프로젝트 홈으로 보냄
      //   return false;
      // }
      // try {
      //   const res = await fetch(`${API_BASE}/auth/me`, {
      //     headers: { "Authorization": `Bearer ${token}` }
      //   });
      //   if (!res.ok) throw new Error("auth fail");
      //   const data = await res.json();
      //   const username = data.username || "익명";
      //   document.getElementById("me-pill").textContent = `👤 ${username}`;
      //   return true;
      // } catch {
      //   alert("세션이 만료되었거나 로그인 정보가 없습니다. 다시 로그인 해주세요.");
      //   Auth.clear();
      //   location.href = "/";
      //   return false;
      // }
      let username = "비로그인"; // 기본값
      if (!token) {
        document.getElementById("me-pill").textContent = `👤 ${username}`;
        return false; // 로그인 상태 아님
      }
      try {
        const res = await fetch(`${API_BASE}/auth/me`, {
          headers: { "Authorization": `Bearer ${token}` }
        });
        if (!res.ok) throw new Error("auth fail");
        const data = await res.json();
        username = data.username || "익명";
        document.getElementById("me-pill").textContent = `👤 ${username}`;
        return true; // 로그인 상태
      } catch {
        // 토큰이 유효하지 않으면 토큰 초기화
        Auth.clear();
        document.getElementById("me-pill").textContent = `👤 비로그인`;
        return false;
      }
    }

    // ================= Handwriting Pad =================
    class HandwritingPad {
      constructor(canvas){
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d',{willReadFrequently:true});
        this.strokeStyle='#111111'; this.baseSize=4; this.usePressure=true; this.isErasing=false;
        this.paths=[]; this.currentPath=null;
        this.resize();
        window.addEventListener('resize',()=>this.resize());
        this._bindPointerEvents(); this._drawGuides();
      }
      setStrokeStyle(c){ this.strokeStyle=c; }
      setBaseSize(px){ this.baseSize=px; }
      setUsePressure(on){ this.usePressure=on; }
      toggleEraser(){ this.isErasing=!this.isErasing; return this.isErasing; }
      clear(){ const rect=this.canvas.getBoundingClientRect(); this.ctx.save(); this.ctx.globalCompositeOperation='source-over'; this.ctx.fillStyle='#ffffff'; this.ctx.fillRect(0,0,rect.width,rect.height); this.ctx.restore(); this._drawGuides(); this.paths=[]; }
      undo(){ if(!this.paths.length) return; this.paths.pop(); this._redrawAll(); }

      async toBlobWhiteBg(){ const rect=this.canvas.getBoundingClientRect(); const dpr=window.devicePixelRatio||1; const off=document.createElement('canvas'); off.width=Math.round(rect.width*dpr); off.height=Math.round(rect.height*dpr); const octx=off.getContext('2d'); octx.scale(dpr,dpr); octx.fillStyle='#ffffff'; octx.fillRect(0,0,rect.width,rect.height); octx.drawImage(this.canvas,0,0); return await new Promise(r=>off.toBlob(r,'image/png',1.0)); }

      resize(){
        const rect=this.canvas.getBoundingClientRect(); if(!rect.width||!rect.height) return;
        const dpr=window.devicePixelRatio||1;
        this.canvas.width=Math.round(rect.width*dpr);
        this.canvas.height=Math.round(rect.height*dpr);
        this.ctx.setTransform(dpr,0,0,dpr,0,0);
        this.ctx.fillStyle='#ffffff'; this.ctx.fillRect(0,0,rect.width,rect.height);
        this._drawGuides(); this._redrawAll();
      }

      _drawGuides(){ const rect=this.canvas.getBoundingClientRect(), ctx=this.ctx; ctx.save(); ctx.strokeStyle='#e2e8f0'; ctx.lineWidth=1; const h=rect.height, margin=16, mid=Math.round(h/2); ctx.beginPath(); ctx.moveTo(margin, mid-40); ctx.lineTo(rect.width-margin, mid-40); ctx.moveTo(margin, mid); ctx.lineTo(rect.width-margin, mid); ctx.moveTo(margin, mid+40); ctx.lineTo(rect.width-margin, mid+40); ctx.stroke(); ctx.restore(); }

      _bindPointerEvents(){
        const c=this.canvas;
        const onDown=(e)=>{ e.preventDefault(); c.setPointerCapture(e.pointerId); this.currentPath={points:[], erase:this.isErasing, color:this.strokeStyle, size:this.baseSize, pressure:this.usePressure}; this.paths.push(this.currentPath); this._addPoint(e); };
        const onMove=(e)=>{ if(!this.currentPath) return; this._addPoint(e,true); };
        const onUp=(e)=>{ if(!this.currentPath) return; this._addPoint(e,true); this.currentPath=null; c.releasePointerCapture(e.pointerId); };
        c.addEventListener('pointerdown',onDown,{passive:false});
        c.addEventListener('pointermove',onMove,{passive:false});
        c.addEventListener('pointerup',onUp,{passive:false});
        c.addEventListener('pointercancel',onUp,{passive:false});
        c.addEventListener('touchstart',e=>e.preventDefault(),{passive:false});
        c.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
      }

      _addPoint(e,draw=false){
        const rect=this.canvas.getBoundingClientRect();
        const card = this.canvas.closest('.upload-card');
        let scaleX = 1, scaleY = 1;
        if (card && card.classList.contains('expanded')) {
          scaleX = rect.width / this.canvas.width;
          scaleY = rect.height / this.canvas.height;
        }
        const x=(e.clientX-rect.left)/scaleX, y=(e.clientY-rect.top)/scaleY;
        const p=(this.usePressure && e.pressure)?e.pressure:1;
        this.currentPath.points.push({x,y,p});
        if(draw) this._redrawLastSegment(); else this._drawDot(x,y,p);
      }
      _strokeWidth(base,p){ const f=Math.max(0.3, Math.min(1.0,p)); return base*(this.usePressure?(0.6+f*0.8):1.0); }
      _redrawAll(){
        const rect=this.canvas.getBoundingClientRect(), ctx=this.ctx;
        ctx.save(); ctx.globalCompositeOperation='source-over'; ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,rect.width,rect.height); ctx.restore();
        this._drawGuides(); for(const path of this.paths) this._drawPath(path);
      }
      _drawPath(path){
        const ctx=this.ctx; ctx.save(); ctx.lineCap='round'; ctx.lineJoin='round';
        ctx.globalCompositeOperation=path.erase?'destination-out':'source-over'; ctx.strokeStyle=path.color;
        const pts=path.points;
        if(pts.length===1){ const w=this._strokeWidth(path.size, pts[0].p);
          ctx.beginPath(); ctx.arc(pts[0].x, pts[0].y, w/2, 0, Math.PI*2);
          ctx.fillStyle=path.erase?'rgba(0,0,0,1)':path.color; ctx.fill(); ctx.restore(); return; }
        for(let i=1;i<pts.length;i++){ const a=pts[i-1], b=pts[i]; const w=this._strokeWidth(path.size, b.p);
          ctx.lineWidth=w; const cx=(a.x+b.x)/2, cy=(a.y+b.y)/2; ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.quadraticCurveTo(a.x,a.y,cx,cy); ctx.stroke(); }
        ctx.restore();
      }
      _redrawLastSegment(){ const path=this.paths[this.paths.length-1]; if(!path) return; const lastTwo={...path, points:path.points.slice(-2)}; this._drawPath(lastTwo); }
      _drawDot(x,y,p){ const ctx=this.ctx; ctx.save(); ctx.globalCompositeOperation=this.isErasing?'destination-out':'source-over';
        ctx.fillStyle=this.isErasing?'rgba(0,0,0,1)':this.strokeStyle; const r=this._strokeWidth(this.baseSize,p)/2;
        ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill(); ctx.restore(); }
    }

    function initStage(){
      const el=document.getElementById('stage');
      stage.el=el;

      window.addEventListener('resize', ()=>{

    function spawnWord(){
      const text = game.wordsPool[Math.floor(Math.random()*game.wordsPool.length)];
      const span = document.createElement('span');
      span.className = "drop-word";
      span.dataset.id = (++game.nowWordId).toString();
      span.textContent = text;
      const x = Math.floor( Math.random()*(stage.width-120) ) + 20;
      span.style.left = x+"px";
      span.style.top = "-40px";
      stage.el.appendChild(span);
      game.active.push({
        id: game.nowWordId, el: span, text, x, y: -40,
        speed: game.speedBase + Math.random()*30,
        locked: false
      });
    }

    function updateWords(dt){
      const now = performance.now();
      for (let i=game.active.length-1; i>=0; i--){
        const w=game.active[i];

        // 잠금된 단어는 멈춤 (시간 초과 시 자동 해제)
        if (w.locked) {
          if (now - game.lockedAt > CONFIG.LOCK_TIMEOUT_MS) {
            w.locked = false;
            w.el.classList.remove('locked');
            game.lockedId = null;
          }
          continue;
        }

        // 낙하
        w.y += (w.speed * dt/1000);
        w.el.style.top = Math.floor(w.y)+"px";

        if (w.y > stage.height){
          // 바닥 도달 → 실패 (잠금 중이 아니므로 정상 실패)
          stage.el.removeChild(w.el);
          game.active.splice(i,1);
          game.miss += 1;
          document.getElementById('miss').textContent = game.miss;
        }
      }
    }

    function gameLoop(ts){
      if(!game.running) return;
      if(!game._last) game._last=ts;
      const dt = ts - game._last; game._last = ts;

      // 스폰
      game.lastSpawn += dt;
      if (game.lastSpawn >= game.spawnEveryMs){
        game.lastSpawn = 0;
        spawnWord();
      }

      // 낙하
      updateWords(dt);

      requestAnimationFrame(gameLoop);
    }

      // 스테이지 정리

      // 버튼 상태
      document.getElementById('start-btn').disabled = true;
      document.getElementById('restart-btn').disabled = true;

      // 타이머

      requestAnimationFrame(gameLoop);
    }

    // ============ 유틸: 패드 → 압축 JPEG Blob ============
    async function padToCompressedBlob(pad, maxW, maxH, mime, quality){
      // pad.canvas 내부 픽셀 해상도 사용
      const src = pad.canvas;
      const sW = src.width, sH = src.height;
      const scale = Math.min(1, maxW / sW, maxH / sH);
      const w = Math.max(1, Math.round(sW * scale));
      const h = Math.max(1, Math.round(sH * scale));
      const off = document.createElement('canvas');
      off.width = w; off.height = h;
      const ctx = off.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0,0,w,h);
      ctx.drawImage(src, 0, 0, w, h);
      return await new Promise(r=> off.toBlob(r, mime, quality));
    }

    // 인식/API 호출이 끝난 후에 게임을 재개합니다.
    function resumeGame() {
      gamePaused = false;
      document.getElementById('time-left').style.color = '';
      // 게임 재개
      if (game.running) {
        // ★★★ 타이머 재시작 (startGame의 로직 재사용) ★★★
        if (!game.timerId) {
          game.timerId = setInterval(()=>{
            game.timeLeft -= 1;
            document.getElementById('time-left').textContent = game.timeLeft;
            if (game.timeLeft <= 0){
              endGame();
            }
          }, 1000);
        }

        game._last = 0; // dt 계산을 위해 last time 초기화
        requestAnimationFrame(gameLoop);
      }
    }

      if (game.lastSpawn >= game.spawnEveryMs){

      }

      // 낙하
      updateWords(dt);

      requestAnimationFrame(gameLoop);

        const res = await fetch(`${API_BASE}/game/drop/leaderboard`, { headers });
        const data = await res.json();
        const list = Array.isArray(data?.items) ? data.items : [];
        const mine = data?.me || null;
        const box = document.getElementById('leaderboard');
        box.innerHTML = '';
        if (!list.length){
          box.innerHTML = '<div class="muted">아직 기록이 없습니다.</div>';
          return;
        }
        list.slice(0,10).forEach((row,idx)=>{
          const div = document.createElement('div');
          const isMe = (mine && mine.username===row.username && mine.score===row.score && mine.at===row.at);
          div.className = 'rank-item' + (isMe ? ' rank-me' : '');
          const dateStr = new Date((row.at||0)*1000).toLocaleString();
          div.innerHTML = `
            <div>#${idx+1}</div>
            <div><b>${row.username}</b><div class="muted" style="font-size:12px;">${dateStr}</div></div>
            <div style="text-align:right;"><b>${row.score}</b> 점</div>
          `;
          box.appendChild(div);
        });
      } catch (e){
        console.error(e);
      }
