<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>로그인 / 회원가입</title>
  <link rel="stylesheet" href="/static/globals.css?v=333">
  <link rel="stylesheet" href="/static/styleguide.css?v=333">
  <link rel="stylesheet" href="/static/style.css?v=334">
  <style>.box{max-width:420px;margin:40px auto;background:#fff;border-radius:12px;padding:20px;border:1px solid #e5e7eb}</style>
</head>
<body class="layout-bg">
  <div class="box">
    <h2>회원가입</h2>
    <input id="r-username" class="input" placeholder="아이디" />
    <input id="r-nickname" class="input" placeholder="닉네임" />
    <input id="r-password" class="input" type="password" placeholder="비밀번호" />
    <button class="btn blue1" onclick="register()">가입</button>
    <hr style="margin:16px 0;">
    <h2>로그인</h2>
    <input id="l-username" class="input" placeholder="아이디" />
    <input id="l-password" class="input" type="password" placeholder="비밀번호" />
    <button class="btn gray" onclick="login()">로그인</button>
    <p id="msg" style="margin-top:10px;color:#ef4444;"></p>
  </div>

  <script>
    async function register(){
      const username = document.getElementById('r-username').value.trim();
      const nickname = document.getElementById('r-nickname').value.trim();
      const password = document.getElementById('r-password').value;
      const res = await fetch('/auth/register', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({username, nickname, password})
      });
      const msg = document.getElementById('msg');
      if(res.ok){ msg.style.color='#16a34a'; msg.textContent='가입 완료! 이제 로그인하세요.'; }
      else { const j=await res.json(); msg.style.color='#ef4444'; msg.textContent=j.detail||'오류'; }
    }

    async function login(){
      const username = document.getElementById('l-username').value.trim();
      const password = document.getElementById('l-password').value;
      const res = await fetch('/auth/login', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({username, password})
      });
      const msg = document.getElementById('msg');
      if(res.ok){
        const j = await res.json();
        localStorage.setItem('access_token', j.access_token);
        msg.style.color='#16a34a'; msg.textContent='로그인 성공! 프로필로 이동합니다.';
        setTimeout(()=> location.href='/profile.html', 700);
      }else{
        const j = await res.json(); msg.style.color='#ef4444'; msg.textContent=j.detail||'로그인 실패';
      }
    }
  </script>
</body>
</html>
